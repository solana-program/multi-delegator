name: "Setup CI Environment"
description: "Shared setup for Rust, Solana, pnpm, and optional surfpool"

inputs:
  enable-rust-cache:
    description: "Enable Rust caching (restore/save)"
    required: false
    default: "true"
  save-rust-cache:
    description: "Save the Rust cache after this job (only enable for the build job)"
    required: false
    default: "false"
  rust-cache-key:
    description: "Key for the Rust cache"
    required: false
    default: "build"
  install-surfpool:
    description: "Install surfpool (only needed for integration tests)"
    required: false
    default: "false"
  install-solana:
    description: "Install Solana CLI"
    required: false
    default: "true"
  solana-version:
    description: "Solana CLI version to install (e.g., 'stable', 'v1.18.23')"
    required: false
    default: "stable"

runs:
  using: "composite"
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust cache
      if: inputs.enable-rust-cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ". -> target"
        shared-key: ${{ inputs.rust-cache-key }}
        save-if: ${{ inputs.save-rust-cache }}
        cache-on-failure: true

    - name: Cache Solana CLI
      if: inputs.install-solana == 'true'
      id: solana-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/solana
          ~/.cache/solana
        key: ${{ runner.os }}-solana-${{ inputs.solana-version }}

    - name: Install Solana CLI
      if: inputs.install-solana == 'true' && steps.solana-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sh -c "$(curl -sSfL https://release.anza.xyz/${{ inputs.solana-version }}/install)"

    - name: Add Solana to PATH
      if: inputs.install-solana == 'true'
      shell: bash
      run: echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

    - name: Create Solana keypair
      if: inputs.install-solana == 'true'
      shell: bash
      run: |
        mkdir -p ~/.config/solana
        [ -f ~/.config/solana/id.json ] || solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

    - name: Add local bin to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Just
      shell: bash
      run: command -v just || curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to ~/.local/bin

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache pnpm store
      id: pnpm-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install pnpm dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Cache surfpool
      if: inputs.install-surfpool == 'true'
      id: surfpool-cache
      uses: actions/cache@v4
      with:
        path: ~/.local/bin/surfpool
        key: ${{ runner.os }}-surfpool-v1

    - name: Install surfpool
      if: inputs.install-surfpool == 'true' && steps.surfpool-cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -sL https://run.surfpool.run/ | bash
