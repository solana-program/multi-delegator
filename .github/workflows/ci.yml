name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          save-rust-cache: "true"
          solana-version: "stable"

      - name: Build program
        run: just build-program

      - name: Build client
        run: just build-client

      - name: Upload program SO
        uses: actions/upload-artifact@v4
        with:
          name: program-so
          path: target/deploy/multi_delegator.so
          retention-days: 1

      - name: Upload program keypair
        uses: actions/upload-artifact@v4
        with:
          name: program-keypair
          path: target/deploy/multi_delegator-keypair.json
          retention-days: 1

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: clients/typescript/dist/
          retention-days: 1

      - name: Upload generated clients
        uses: actions/upload-artifact@v4
        with:
          name: generated-clients
          path: |
            clients/typescript/src/generated/
            clients/rust/src/generated/
          retention-days: 1

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          solana-version: "stable"
          rust-cache-key: "unit-test"
          save-rust-cache: "true"

      - name: Test program
        run: just test-program

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          install-solana: "false"

      - name: Check formatting and linting
        run: just check

  integration-test:
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          install-surfpool: "true"
          solana-version: "stable"
          enable-rust-cache: "false"

      - name: Download program SO
        uses: actions/download-artifact@v4
        with:
          name: program-so
          path: target/deploy/

      - name: Download program keypair
        uses: actions/download-artifact@v4
        with:
          name: program-keypair
          path: target/deploy/

      - name: Download generated clients
        uses: actions/download-artifact@v4
        with:
          name: generated-clients
          path: clients/

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: clients/typescript/dist/

      - name: Start surfpool and wait for program
        run: just ensure-surfpool

      - name: Run integration tests
        run: cd clients/typescript && pnpm run test

      - name: Kill validator
        if: always()
        run: just kill-validator

  benchmark:
    if: github.event_name == 'pull_request'
    needs: [unit-test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          solana-version: "stable"
          rust-cache-key: "unit-test"

      - name: Run benchmark
        run: just test-and-benchmark

      - name: Post CU report comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- cu-report -->"
          REPORT="$MARKER
          $(cat programs/multi_delegator/cu_report.md)"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$REPORT"
          else
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              -f body="$REPORT"
          fi
